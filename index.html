<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snaked - Board Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Game-like title and clean playful body -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-900 text-slate-200 font-sans h-screen overflow-hidden selection:bg-emerald-500/30 relative">

    <!-- Ambient background glow -->
    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-emerald-500/5 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <!-- ==========================================================================
         SCREEN 1: MAIN MENU
         ========================================================================== -->
    <div id="screen-main-menu" class="screen items-center justify-center z-20">
        <!-- Dynamic animated background (blurred board effect) -->
        <div class="menu-bg-overlay"></div>

        <!-- Menu container -->
        <div class="menu-container">
            <!-- Header: Title and Subtitle -->
            <div class="menu-header">
                <h1 class="menu-title" style="font-family: 'Orbitron', sans-serif;">SNAKED</h1>
                <p class="menu-subtitle" style="font-family: 'Poppins', sans-serif;">Not the Ordinary Snake & Ladder</p>
            </div>

            <!-- Button Group -->
            <div class="menu-button-group">
                <!-- Primary: Play Button -->
                <button 
                    onclick="AudioSys.menuClick(); openSettings('solo')" 
                    onmouseover="AudioSys.menuHover()"
                    class="menu-btn menu-btn-primary">
                    <span id="icon-solo-menu"></span>
                    <span class="menu-btn-label">Play</span>
                </button>

                <!-- Divider -->
                <div class="menu-button-divider"></div>

                <!-- Multiplayer buttons (disabled for future) -->
                <div class="menu-multiplayer-group">
                    <button 
                        disabled 
                        onmouseover="AudioSys.menuHover()"
                        class="menu-btn menu-btn-secondary menu-btn-disabled"
                        title="Coming Soon">
                        <span id="icon-create-room"></span>
                        <span class="menu-btn-label">Create Room</span>
                        <span class="menu-btn-badge" style="font-family: 'Poppins', sans-serif;">Soon</span>
                    </button>

                    <button 
                        disabled 
                        onmouseover="AudioSys.menuHover()"
                        class="menu-btn menu-btn-secondary menu-btn-disabled"
                        title="Coming Soon">
                        <span id="icon-join-room"></span>
                        <span class="menu-btn-label">Join Room</span>
                        <span class="menu-btn-badge" style="font-family: 'Poppins', sans-serif;">Soon</span>
                    </button>
                </div>
            </div>

            <!-- Sound toggle (bottom) -->
            <div class="menu-footer">
                <button 
                    onclick="AudioSys.toggleMute()" 
                    id="btn-mute-main" 
                    class="menu-sound-toggle">
                    <!-- Injected via JS -->
                </button>
            </div>
        </div>
    </div>

    <!-- ==========================================================================
         SCREEN 2: SETUP - PASS & PLAY
         ========================================================================== -->
    <div id="screen-setup-passplay" class="screen hidden-screen items-center justify-center z-20">
        <div class="bg-slate-800/90 backdrop-blur-xl p-8 rounded-3xl border border-slate-700 max-w-md w-full text-center panel-3d ring-1 ring-white/10">
            <h2 class="text-3xl font-black mb-6 text-white drop-shadow-md">Pass & Play</h2>
            <div class="mb-8">
                <label class="block text-xs font-bold mb-3 text-slate-400 uppercase tracking-widest">Select Players:</label>
                <select id="pp-player-count" class="w-full p-4 border border-slate-600 rounded-xl bg-slate-900 text-white font-bold focus:outline-none focus:ring-2 focus:ring-emerald-500 text-center shadow-inner">
                    <option value="2">2 Players</option>
                    <option value="3">3 Players</option>
                    <option value="4">4 Players</option>
                </select>
            </div>
            <div class="flex gap-3">
                <button onclick="navTo('screen-main-menu')" class="btn-3d flex-1 bg-gradient-to-b from-slate-700 to-slate-800 hover:from-slate-600 hover:to-slate-700 text-white font-bold py-3 px-4 rounded-xl border-slate-900">Back</button>
                <button onclick="initGame('passplay')" class="btn-3d flex-[2] bg-gradient-to-b from-emerald-500 to-emerald-600 hover:from-emerald-400 hover:to-emerald-500 text-white font-black py-3 px-4 rounded-xl border-emerald-800 shadow-[0_0_15px_rgba(16,185,129,0.3)]">
                    START
                </button>
            </div>
        </div>
    </div>

    <!-- ==========================================================================
         SCREEN 3: SETUP - SOLO MODE
         ========================================================================== -->
    <div id="screen-setup-solo" class="screen hidden-screen items-center justify-center z-20">
        <div class="bg-slate-800/90 backdrop-blur-xl p-8 rounded-3xl border border-slate-700 max-w-md w-full text-center panel-3d ring-1 ring-white/10">
            <h2 class="text-3xl font-black mb-6 text-white drop-shadow-md">Solo Mode</h2>
            <div class="mb-8">
                <label class="block text-xs font-bold mb-3 text-slate-400 uppercase tracking-widest">Number of Bots:</label>
                <select id="solo-bot-count" class="w-full p-4 border border-slate-600 rounded-xl bg-slate-900 text-white font-bold focus:outline-none focus:ring-2 focus:ring-emerald-500 text-center shadow-inner">
                    <option value="1">1 Bot (Duel)</option>
                    <option value="2">2 Bots (Chaos)</option>
                    <option value="3">3 Bots (Mayhem)</option>
                </select>
            </div>
            <div class="flex gap-3">
                <button onclick="navTo('screen-main-menu')" class="btn-3d flex-1 bg-gradient-to-b from-slate-700 to-slate-800 hover:from-slate-600 hover:to-slate-700 text-white font-bold py-3 px-4 rounded-xl border-slate-900">Back</button>
                <button onclick="initGame('solo')" class="btn-3d flex-[2] bg-gradient-to-b from-blue-500 to-blue-600 hover:from-blue-400 hover:to-blue-500 text-white font-black py-3 px-4 rounded-xl border-blue-800 shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                    START
                </button>
            </div>
        </div>
    </div>

    <!-- ==========================================================================
         SCREEN 4: GAME INTERFACE (3-COLUMN LAYOUT)
         ========================================================================== -->
    <!-- ==========================================================================
         SCREEN X: GAME SETTINGS
         ========================================================================== -->
    <div id="screen-game-settings" class="screen hidden-screen items-center justify-center z-20">
        <div class="bg-slate-800/90 backdrop-blur-xl p-6 rounded-3xl border border-slate-700 max-w-2xl w-full text-left panel-3d ring-1 ring-white/10">
            <h2 class="text-2xl font-black mb-4 text-white drop-shadow-md">Game Settings</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold mb-2 text-slate-400 uppercase tracking-widest">Game Time (seconds)</label>
                    <input id="cfg-game-time" type="number" min="0" value="300" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-white" />
                    <p class="text-[11px] text-slate-500 mt-1">0 = no global time limit</p>
                </div>
                <div>
                    <label class="block text-xs font-bold mb-2 text-slate-400 uppercase tracking-widest">Turn Time (seconds)</label>
                    <input id="cfg-turn-time" type="number" min="0" value="10" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-white" />
                    <p class="text-[11px] text-slate-500 mt-1">0 = no per-turn limit</p>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold mb-2 text-slate-400 uppercase tracking-widest">Players</label>
                    <div class="flex gap-2 items-center mb-2">
                        <label class="text-slate-400 text-sm">Count</label>
                        <select id="cfg-player-count" class="p-2 rounded-lg bg-slate-900 border border-slate-700 text-white">
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                        </select>
                    </div>
                    <div id="cfg-player-slots" class="grid grid-cols-1 sm:grid-cols-2 gap-2"></div>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold mb-2 text-slate-400 uppercase tracking-widest">Power-ups</label>
                    <div id="cfg-powerups" class="flex flex-wrap gap-2"></div>
                </div>
            </div>
            <div class="mt-4 flex justify-end gap-3">
                <button onclick="navTo('screen-main-menu')" class="btn-3d bg-slate-700 text-sm px-4 py-2 rounded-xl">Cancel</button>
                <button id="cfg-start-btn" class="btn-3d bg-emerald-500 text-white font-black px-4 py-2 rounded-xl">Start Match</button>
            </div>
        </div>
    </div>
    <div id="screen-game" class="screen hidden-screen z-10 flex flex-col h-full bg-slate-950">
        
        <!-- Game Header -->
        <header class="bg-slate-900 text-white p-2 sm:p-3 shadow-xl flex justify-between items-center z-30 shrink-0 border-b border-slate-800 panel-3d">
            <div class="flex items-center gap-4">
                <h1 class="text-xl sm:text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 ml-2 drop-shadow-md">SNAKED</h1>
                <div id="global-timer" class="text-sm font-mono font-bold text-slate-300 bg-slate-800/80 px-3 py-1.5 rounded-lg border border-slate-700 shadow-inner hidden">
                    ⏱️ <span id="global-timer-text">--:--</span>
                </div>
            </div>
            <div id="game-status-banner" class="text-xs sm:text-sm font-bold bg-slate-800/80 px-5 py-2 rounded-full shadow-inner border border-slate-700 flex items-center gap-2">
                <!-- Turn info injected -->
            </div>
            <div class="flex gap-2 mr-2">
                <button onclick="AudioSys.toggleMute()" id="btn-mute-game" class="btn-3d bg-gradient-to-b from-slate-700 to-slate-800 hover:from-slate-600 hover:to-slate-700 p-2 rounded-lg border border-slate-900 flex items-center justify-center text-slate-300 w-10 h-10 shadow-md"></button>
                <button onclick="togglePause()" id="btn-pause-game" class="btn-3d bg-gradient-to-b from-slate-700 to-slate-800 hover:from-slate-600 hover:to-slate-700 p-2 rounded-lg border border-slate-900 flex items-center justify-center text-slate-300 w-10 h-10 shadow-md"></button>
            </div>
        </header>

        <!-- Main Game Area (3 Columns) -->
        <div class="flex-1 flex flex-col lg:flex-row p-3 md:p-5 gap-3 lg:gap-4 overflow-hidden min-h-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black main-game-area">
            
            <!-- LEFT COLUMN: Controls & Action Log -->
            <div class="w-full lg:w-60 flex flex-col gap-3 h-full shrink-0 relative z-20 side-panel-left">
                <div class="bg-gradient-to-b from-slate-800 to-slate-800/95 p-4 rounded-2xl panel-3d border border-slate-700 ring-1 ring-white/5 flex-1 flex flex-col relative overflow-hidden shadow-2xl">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-gradient-to-b from-emerald-500 to-cyan-500"></div>
                    
                    <!-- Dice Result Area -->
                    <div class="flex flex-col items-center justify-center bg-slate-900/60 rounded-xl p-4 mb-4 border border-slate-700/50 shadow-inner shrink-0 relative overflow-hidden">
                        <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMDIiLz4KPC9zdmc+')] opacity-50"></div>
                        <span class="text-[9px] text-slate-500 uppercase font-black tracking-[0.2em] mb-2 relative z-10">Roll Result</span>
                        <div id="dice-display" class="w-16 h-16 bg-gradient-to-br from-slate-100 to-slate-300 rounded-2xl shadow-[0_10px_20px_rgba(0,0,0,0.6),inset_0_-4px_8px_rgba(0,0,0,0.2)] flex items-center justify-center text-slate-800 transition-transform relative z-10">
                            <!-- SVG Injected -->
                        </div>
                        <div id="dice-detail" class="text-[10px] text-emerald-400 mt-3 h-3 font-mono font-bold tracking-wide relative z-10">Awaiting Roll...</div>
                    </div>
                    
                    <!-- Action Buttons -->
                    <div class="flex gap-2 mb-3 shrink-0">
                        <button id="btn-roll" onclick="handleRollClick()" class="btn-3d flex-1 bg-gradient-to-b from-blue-500 to-blue-600 hover:from-blue-400 hover:to-blue-500 disabled:from-slate-800 disabled:to-slate-900 disabled:text-slate-600 disabled:border-slate-900 text-white font-bold py-3.5 px-2 rounded-xl border-blue-800 shadow-[0_8px_15px_rgba(59,130,246,0.3)] flex items-center justify-center gap-2 text-sm tracking-wide transition-all">
                            <span id="icon-btn-roll"></span> Roll
                        </button>
                        <button id="btn-powerup" onclick="usePowerup()" class="btn-3d flex-1 bg-gradient-to-b from-purple-500 to-purple-600 hover:from-purple-400 hover:to-purple-500 disabled:opacity-50 text-white font-bold py-3.5 px-2 rounded-xl border-purple-800 shadow-[0_8px_15px_rgba(168,85,247,0.3)] flex items-center justify-center gap-2 text-sm tracking-wide hidden transition-all">
                            <!-- Text updated dynamically -->
                        </button>
                    </div>

                    <div id="action-prompt" class="text-xs font-semibold text-orange-400 mb-3 p-3 bg-gradient-to-br from-orange-950/60 to-orange-900/40 rounded-xl hidden border border-orange-800/50 text-center shadow-inner shrink-0"></div>

                    <!-- Action Log -->
                    <div class="mt-auto flex-1 flex flex-col min-h-[120px] overflow-hidden bg-slate-900/80 rounded-xl border border-slate-700/50 shadow-inner">
                        <div class="p-2 border-b border-slate-700/50 bg-slate-800/50">
                            <h3 class="font-black text-[9px] text-slate-400 uppercase tracking-widest flex justify-between items-center px-1">
                                Action Log <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse shadow-[0_0_5px_rgba(52,211,153,0.8)]"></span>
                            </h3>
                        </div>
                        <div id="action-log" class="p-2 flex-1 overflow-y-auto text-xs flex flex-col gap-2 font-mono scroll-smooth">
                        </div>
                    </div>
                </div>
            </div>

            <!-- CENTER COLUMN: Dominant Board View -->
            <div class="flex-1 flex items-center justify-center relative h-full min-h-[50vh] lg:min-h-0 z-10 py-2">
                <div id="board" class="board-grid aspect-square h-full max-h-full max-w-full shadow-[0_25px_50px_-12px_rgba(0,0,0,0.8)] panel-3d ring-1 ring-white/10 bg-slate-900">
                    <svg id="connections-layer" class="absolute inset-0 w-full h-full pointer-events-none z-10" style="filter: drop-shadow(0 5px 8px rgba(0,0,0,0.6));"></svg>
                    <!-- Cells injected -->
                </div>
            </div>

            <!-- RIGHT COLUMN: Leaderboard -->
            <div class="w-full lg:w-64 flex flex-col gap-3 h-full shrink-0 relative z-20 side-panel-right">
                <div class="bg-gradient-to-b from-slate-800 to-slate-800/95 rounded-2xl panel-3d border border-slate-700 ring-1 ring-white/5 flex-1 flex flex-col overflow-hidden shadow-2xl">
                    <div class="p-4 border-b border-slate-700 bg-slate-900/60 shadow-inner flex justify-between items-center relative overflow-hidden">
                        <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMDIiLz4KPC9zdmc+')] opacity-50"></div>
                        <h3 class="font-black text-xs uppercase tracking-widest text-slate-300 relative z-10 flex items-center gap-2">
                            <span id="icon-leaderboard-header"></span> Leaderboard
                        </h3>
                    </div>
                    <div id="leaderboard-container" class="flex-1 overflow-y-auto p-3 flex flex-col gap-2.5">
                        <!-- Players injected here via JS -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- ==========================================================================
         MODALS (Overlays inside Game Screen)
         ========================================================================== -->
         
    <!-- Pause Modal -->
    <div id="pause-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md hidden items-center justify-center z-50">
        <div class="bg-gradient-to-b from-slate-800 to-slate-900 p-8 rounded-3xl border border-slate-700 text-center max-w-xs w-full panel-3d ring-1 ring-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.8)]">
            <h2 class="text-3xl font-black text-white mb-8 tracking-widest drop-shadow-md">PAUSED</h2>
            <div class="flex flex-col gap-4">
                <button onclick="togglePause()" class="btn-3d w-full bg-gradient-to-b from-blue-500 to-blue-600 hover:from-blue-400 hover:to-blue-500 text-white font-bold py-3.5 rounded-xl border-blue-800 shadow-lg flex items-center justify-center gap-3">
                    <span id="icon-resume"></span> Resume
                </button>
                <button onclick="AudioSys.toggleMute()" id="btn-mute-pause" class="btn-3d w-full bg-gradient-to-b from-slate-700 to-slate-800 hover:from-slate-600 hover:to-slate-700 text-white font-bold py-3.5 rounded-xl border-slate-900 shadow-lg flex items-center justify-center gap-3">
                    <!-- JS handles text/icon -->
                </button>
                <div class="h-px bg-slate-700/50 my-2"></div>
                <button onclick="exitToMenu()" class="btn-3d w-full bg-gradient-to-b from-red-500/20 to-red-600/20 hover:from-red-500/30 hover:to-red-600/30 text-red-400 hover:text-red-300 font-bold py-3.5 rounded-xl border-red-900/50 shadow-lg">
                    Exit to Menu
                </button>
            </div>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="game-over-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md hidden items-center justify-center z-50">
        <div class="bg-gradient-to-b from-slate-800 to-slate-900 p-10 rounded-3xl border border-slate-700 text-center max-w-md w-full panel-3d ring-1 ring-white/10 shadow-[0_30px_60px_rgba(0,0,0,0.9)]">
            <div class="mb-6 flex justify-center anim-pop drop-shadow-[0_0_20px_rgba(250,204,21,0.5)] text-yellow-400">
                <span id="icon-trophy"></span>
            </div>
            <h2 id="winner-text" class="text-4xl font-black text-white mb-2 tracking-wide drop-shadow-md">Player X Wins!</h2>
            <p id="winner-subtext" class="text-slate-400 mb-10 font-medium tracking-wide">Conquered the board.</p>
            <button onclick="exitToMenu()" class="btn-3d w-full bg-gradient-to-b from-emerald-500 to-emerald-600 hover:from-emerald-400 hover:to-emerald-500 text-white font-black py-4 px-4 rounded-xl shadow-[0_10px_20px_rgba(16,185,129,0.3)] border-emerald-800 text-lg uppercase tracking-widest">
                Back to Main Menu
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/icons.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/config.js"></script>
    <script src="js/gameConfig.js"></script>
    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/board.js"></script>
    <script src="js/traps.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
